id: k8s-list-deployments
title: "List Deployments"
xp: 25
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-workloads"
    - "rm -f $HOME/k8s-workloads/deployments-count.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-list-deployments &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment web --image=nginx --context=kind-tld-k8s-list-deployments'
version: 1
