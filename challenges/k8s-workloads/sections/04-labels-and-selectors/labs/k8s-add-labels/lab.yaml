id: k8s-add-labels
title: "Label a Resource"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-add-labels &>/dev/null; do sleep 1; done'
    - 'kubectl run metadata-pod --image=nginx --context=kind-tld-k8s-add-labels'
version: 1
