id: k8s-update-image
title: "Update Container Image"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-update-image &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment rollout-deploy --image=nginx:1.14.2 --context=kind-tld-k8s-update-image'
version: 1
