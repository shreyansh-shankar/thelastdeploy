id: k8s-debug-crashloopbackoff
title: "Debug CrashLoopBackOff"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-troubleshooting"
    - "rm -f $HOME/k8s-troubleshooting/crash-code.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-debug-crashloopbackoff &>/dev/null; do sleep 1; done'
    - 'kubectl run crashing-app --image=alpine --context=kind-tld-k8s-debug-crashloopbackoff -- sh -c "echo FATAL_ERROR_CODE_9876 >&2 && exit 1"'
version: 1
