id: k8s-debug-imagepullbackoff
title: "Debug ImagePullBackOff"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-debug-imagepullbackoff &>/dev/null; do sleep 1; done'
    - 'kubectl run pull-failed-pod --image=nginxxxxxxx --context=kind-tld-k8s-debug-imagepullbackoff'
version: 1
