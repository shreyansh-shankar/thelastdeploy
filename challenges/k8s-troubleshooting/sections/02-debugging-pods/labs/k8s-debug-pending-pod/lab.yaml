id: k8s-debug-pending-pod
title: "Debug Pending Pod"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-troubleshooting"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-debug-pending-pod &>/dev/null; do sleep 1; done'
    - 'echo -e "apiVersion: v1\nkind: Pod\nmetadata:\n  name: pending-pod\nspec:\n  containers:\n  - name: web\n    image: nginx\n    resources:\n      requests:\n        cpu: \"100\"" > $HOME/k8s-troubleshooting/pending-pod.yaml'
    - 'kubectl apply -f $HOME/k8s-troubleshooting/pending-pod.yaml --context=kind-tld-k8s-debug-pending-pod'
version: 1
