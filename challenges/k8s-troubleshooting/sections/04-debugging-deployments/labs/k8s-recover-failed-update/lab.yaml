id: k8s-recover-failed-update
title: "Recover Stuck Rollout"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-recover-failed-update &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment rollout-app --image=nginx:1.161.typo --context=kind-tld-k8s-recover-failed-update'
version: 1
