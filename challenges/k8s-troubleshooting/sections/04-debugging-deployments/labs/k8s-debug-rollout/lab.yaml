id: k8s-debug-rollout
title: "Identify Stuck Rollout Cause"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-troubleshooting"
    - "rm -f $HOME/k8s-troubleshooting/bad-image.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-debug-rollout &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment rollout-app --image=nginx:1.161.typo --context=kind-tld-k8s-debug-rollout'
version: 1
