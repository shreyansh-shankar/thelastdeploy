id: k8s-read-events
title: "Read Warning Events"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-troubleshooting"
    - "rm -f $HOME/k8s-troubleshooting/warning-reason.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-read-events &>/dev/null; do sleep 1; done'
    - 'kubectl run unschedulable-pod --image=nginx --overrides="{\"spec\":{\"nodeSelector\":{\"disktype\":\"ssd-nonexistent\"}}}" --context=kind-tld-k8s-read-events'
version: 1
