id: k8s-fix-selector-mismatch
title: "Fix Service Selector"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-troubleshooting"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-fix-selector-mismatch &>/dev/null; do sleep 1; done'
    - 'kubectl run web-pod --image=nginx --labels="app=web,env=prod" --context=kind-tld-k8s-fix-selector-mismatch'
    - 'echo -e "apiVersion: v1\nkind: Service\nmetadata:\n  name: web-service\nspec:\n  selector:\n    app: web-app\n  ports:\n  - port: 80\n    targetPort: 80" > $HOME/k8s-troubleshooting/svc-bad.yaml'
    - 'kubectl apply -f $HOME/k8s-troubleshooting/svc-bad.yaml --context=kind-tld-k8s-fix-selector-mismatch'
version: 1
