id: dkr-restore-service-connectivity
title: "Restore service connectivity"
xp: 45
estimated_minutes: 10
order: 1
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-troubleshooting/connectivity"
    - "echo -e 'version: \"3.8\"\nservices:\n  web:\n    image: nginx:alpine\n    ports:\n      - \"8085:80\"\n    networks:\n      - web-net\n  db:\n    image: postgres:15-alpine\n    environment:\n      - POSTGRES_PASSWORD=secret\n    networks:\n      - db-net\nnetworks:\n  web-net:\n  db-net:' > $HOME/docker-troubleshooting/connectivity/docker-compose.yml"
    - "docker compose -f $HOME/docker-troubleshooting/connectivity/docker-compose.yml down -v || true"
    - "docker compose -f $HOME/docker-troubleshooting/connectivity/docker-compose.yml up -d"
version: 1
