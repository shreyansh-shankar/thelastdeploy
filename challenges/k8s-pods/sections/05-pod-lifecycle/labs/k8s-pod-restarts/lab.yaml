id: k8s-pod-restarts
title: "Observe Pod Restarts"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-pods"
    - "rm -f $HOME/k8s-pods/restarts.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-pod-restarts &>/dev/null; do sleep 1; done'
    - 'kubectl run restart-pod --image=alpine --context=kind-tld-k8s-pod-restarts -- sh -c "exit 0"'
version: 1
