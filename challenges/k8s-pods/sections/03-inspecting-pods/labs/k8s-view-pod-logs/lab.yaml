id: k8s-view-pod-logs
title: "Inspect Pod Logs"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-pods"
    - "rm -f $HOME/k8s-pods/flag.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-view-pod-logs &>/dev/null; do sleep 1; done'
    - 'kubectl run logging-pod --image=alpine --context=kind-tld-k8s-view-pod-logs -- sh -c "echo FLAG_LOG_MESSAGE_9921 && sleep 3600"'
version: 1
