id: k8s-exec-into-pod
title: "Exec Into Container"
xp: 35
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-exec-into-pod &>/dev/null; do sleep 1; done'
    - 'kubectl run exec-pod --image=nginx --context=kind-tld-k8s-exec-into-pod'
version: 1
