id: dkr-build-custom-nginx-site
title: "Build custom Nginx site"
xp: 25
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-build/nginx-custom"
    - "echo '<h1>Hello from Nginx</h1>' > $HOME/docker-build/nginx-custom/index.html"
    - "rm -f $HOME/docker-build/nginx-custom/Dockerfile"
    - "docker rmi -f my-nginx-web:latest || true"
version: 1
