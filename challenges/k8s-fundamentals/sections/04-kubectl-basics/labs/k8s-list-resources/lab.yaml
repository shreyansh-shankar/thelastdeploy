id: k8s-list-resources
title: "List Cluster Resources"
xp: 25
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-fundamentals"
    - "rm -f $HOME/k8s-fundamentals/pods-list.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-list-resources &>/dev/null; do sleep 1; done'
    - "kubectl run frontend --image=nginx --context=kind-tld-k8s-list-resources"
    - "kubectl run backend --image=nginx --context=kind-tld-k8s-list-resources"
    - "kubectl run database --image=nginx --context=kind-tld-k8s-list-resources"
version: 2
